name: Obfuscate

on:
  push:
    branches: [main]
    paths:
      - "source/**"
      - "scripts/obfuscate.sh"
      - ".github/workflows/obfuscate.yml"
  workflow_dispatch:

jobs:
  obfuscate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Prometheus
        run: curl -fsSL https://raw.githubusercontent.com/prometheus-lua/Prometheus/master/install.sh | sh

      - name: Run obfuscation
        run: |
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          chmod +x scripts/obfuscate.sh
          scripts/obfuscate.sh
        env:
          PROMETHEUS_PRESET: Medium
          PROMETHEUS_ENTRY_PRESET: Weak

      - name: Commit obfuscated output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add HmzHub.lua HmzLoader.lua loader.lua HmzHub/
          if git diff --staged --quiet; then
            echo "No obfuscation changes"
            exit 0
          fi
          git commit -m "chore: obfuscate with Prometheus"
          git push
